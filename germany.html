<title>FIFA World Cup — Germany</title>

<style>
:root {
  --blue: #123d64;
  --blue2: #1e5d8f;
  --bg: #f6f8fb;
  --panel: #ffffff;
  --line: #d9e2ec;
  --text: #1f2933;
  --muted: #66788a;
}

body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Arial, Helvetica, sans-serif;
}

.wrapper {
  max-width: 1180px;
  margin: 0 auto;
  padding: 28px 22px 48px 22px;
}

.header {
  background: var(--blue);
  color: #fff;
  padding: 24px 28px;
  border-radius: 16px;
  box-shadow: 0 4px 18px rgba(0,0,0,.12);
}

.header h1 {
  margin: 0 0 8px 0;
  font-size: 28px;
  line-height: 1.2;
}

.header p {
  margin: 0;
  color: #d9e9f8;
  font-size: 15px;
}

.nav {
  margin: 18px 0 24px 0;
}

.nav a {
  display: inline-block;
  margin: 0 8px 8px 0;
  padding: 8px 12px;
  background: #fff;
  color: var(--blue);
  border: 1px solid var(--line);
  border-radius: 999px;
  text-decoration: none;
  font-weight: 700;
  font-size: 13px;
}

.section {
  margin: 24px 0;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.05);
}

.section-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
  align-items: start;
}

@media (max-width: 760px) {
  .wrapper {
    padding: 16px 10px 32px 10px;
  }

  .header {
    border-radius: 10px;
  }

  .section-grid {
    grid-template-columns: 1fr;
  }

  th, td {
    font-size: 12px;
    padding: 8px 7px;
  }
}

@media (max-width: 900px) {
  .section-grid {
    grid-template-columns: 1fr;
  }
}

.section h2 {
  margin: 0;
  padding: 14px 18px;
  background: var(--blue);
  color: #fff;
  font-size: 20px;
}

.meta {
  color: var(--muted);
  font-size: 13px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #eef4f9;
  color: var(--blue);
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
}

td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  font-size: 14px;
}

tr:last-child td {
  border-bottom: none;
}

.num {
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.game {
  font-weight: 700;
}

.favorite {
  color: var(--blue);
  font-weight: 800;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  margin-top: 18px;
}

.card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px 16px;
  text-decoration: none;
  color: var(--text);
}

.card strong {
  color: var(--blue);
}

.card span {
  display: block;
  margin-top: 5px;
  color: var(--muted);
  font-size: 13px;
}

.footer {
  margin-top: 36px;
  color: var(--muted);
  font-size: 12px;
}

@media (max-width: 760px) {
  .wrapper {
    padding: 16px 10px 32px 10px;
  }

  .header {
    border-radius: 10px;
  }

  th, td {
    font-size: 12px;
    padding: 8px 7px;
  }
}
